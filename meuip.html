<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meu IP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 28px;
        }

        .info-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 16px;
            margin: 8px 0;
            text-align: left;
        }

        .info-card label {
            display: block;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .info-card .value {
            color: #FF8000;
            font-size: 20px;
            font-weight: bold;
            word-break: break-all;
        }

        .info-card .value.ip {
            font-size: 28px;
        }

        #loading {
            color: #666;
            font-style: italic;
        }

        .footer {
            margin-top: 16px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Qual é o Meu IP?</h1>
        
        <div id="loading">Carregando informações...</div>
        
        <div id="info" style="display: none;">
            <div class="info-card">
                <label>Meu IP</label>
                <div class="value ip" id="ip"></div>
            </div>

            <div class="info-card">
                <label>IP Reverso</label>
                <div class="value" id="reverseIp"></div>
            </div>

            <div class="info-card">
                <label>Data e Hora</label>
                <div class="value" id="datetime"></div>
            </div>

            <div class="info-card">
                <label>User Agent</label>
                <div class="value" id="userAgent"></div>
            </div>

            <div class="info-card">
                <label>Language</label>
                <div class="value" id="language"></div>
            </div>
        </div>

        <div class="footer">
            Informações da sua conexão
        </div>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const options = { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric',
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: false
            };
            document.getElementById('datetime').textContent = now.toLocaleString('pt-BR', options);
        }

        function showUserAgent() {
            document.getElementById('userAgent').textContent = navigator.userAgent;
        }

        function showLanguage() {
            document.getElementById('language').textContent = navigator.language || navigator.userLanguage;
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('ip').textContent = data.ip;
                
                try {
                    const dnsResponse = await fetch(`https://dns.google/resolve?name=${data.ip}.in-addr.arpa&type=PTR`);
                    const dnsData = await dnsResponse.json();
                    if (dnsData.Answer && dnsData.Answer.length > 0) {
                        const ptrRecord = dnsData.Answer.find(a => a.type === 12);
                        document.getElementById('reverseIp').textContent = ptrRecord ? ptrRecord.data : 'Não disponível';
                    } else {
                        document.getElementById('reverseIp').textContent = 'Não disponível';
                    }
                } catch {
                    document.getElementById('reverseIp').textContent = 'Não disponível';
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('info').style.display = 'block';
            } catch (error) {
                document.getElementById('loading').textContent = 'Erro ao obter IP';
            }
        }

        showUserAgent();
        showLanguage();
        updateDateTime();
        setInterval(updateDateTime, 1000);
        getIP();
    </script>
</body>
</html>
